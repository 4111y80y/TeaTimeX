<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>喝茶神器</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <!-- 头部 -->
    <header class="header">
      <div class="header-title">
        <span class="header-icon">🍵</span>
        <h1>喝茶神器</h1>
      </div>
      <p class="header-subtitle">❤️爱的茶馆❤️ 成员标记</p>
    </header>

    <!-- 统计信息 -->
    <div class="stats-bar">
      <span class="stats-count" id="memberCount">0 位成员</span>
      <div class="stats-actions">
        <button class="btn-icon" id="btnImport" title="导入名单">📥</button>
        <button class="btn-icon" id="btnExport" title="导出名单">📤</button>
      </div>
    </div>

    <!-- 搜索框 -->
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="🔍 搜索用户 handle 或名称..." autocomplete="off">
    </div>

    <!-- 添加用户 -->
    <div class="add-section">
      <input type="text" id="addHandle" placeholder="输入 handle (不含@)" autocomplete="off">
      <input type="text" id="addName" placeholder="显示名称 (可选)" autocomplete="off">
      <button class="btn-add" id="btnAdd">+ 添加</button>
    </div>

    <!-- 用户列表 -->
    <div class="member-list" id="memberList">
      <!-- 动态生成 -->
    </div>

    <!-- 底部 -->
    <footer class="footer">
      <a href="https://x.com/i/chat/g2016856146381000833/info" target="_blank" class="footer-link">🔗 群聊链接</a>
      <span class="footer-ver">v1.0.0</span>
    </footer>
  </div>

  <!-- 隐藏的文件输入 -->
  <input type="file" id="fileInput" accept=".json" style="display:none">

  <!-- Emoji 选择器弹窗 -->
  <div class="emoji-picker-overlay" id="emojiOverlay" style="display:none">
    <div class="emoji-picker">
      <div class="emoji-picker-header">
        <span>选择图标</span>
        <button class="btn-close" id="btnCloseEmoji">✕</button>
      </div>
      <div class="emoji-grid" id="emojiGrid"></div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
